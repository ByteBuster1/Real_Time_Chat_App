<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>

    <title>Real-Time Chat Application</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            margin-bottom: 30px;
            color: black;
            font-weight: 600;
        }

        #chat {
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            height: 300px;
        }

        .message {
            padding: 8px 12px;
            background-color: #e9ecef;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        #sendMessage {

            font-weight: bold;
            padding: 10px;
        }

        #senderInput, #messageInput {
            background-color: #f8f9fa;
            border: 1px solid #ced4da;
            border-radius: 5px;
            padding: 10px;
        }

        #senderInput:focus, #messageInput:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
        }
    </style>

</head>
<body>
  <div class = "container mt-4" >
      <h1 class="text-center">Real-Time Chat Application</h1>
      <div class="border rounded p-3 mb-3 "
           id="chat"
           style="height:300px;overflow-y:auto;">
      </div>
      <div class="input-group mb-3">
          <input id="senderInput" type="text" class="form-control"
          placeholder="Your name......"/>
      </div>
      <div class="input-group mb-3">
          <input id="messageInput" type="text" class="form-control"
                 placeholder="Type a message...."/>
      </div>
      <div id="input-group-append">
          <button id="sendMessage" class="btn btn-success">Send</button>
      </div>
  </div>
</body>
<script>


    function setConnected(connected){
      document.getElementById('sendMessage').disabled=!connected;
    }

    function connect(){
       var socket = new SockJS('/chat');
       stompClient = Stomp.over(socket);
       stompClient.connect({}, function (frame){
           setConnected(true);
           stompClient.subscribe('/topic/messages',function(message){
           showMessage(JSON.parse(message.body));
        });
       });
       }

       function showMessage(message){
          var chat = document.getElementById('chat');
          var messageElement = document.createElement('div');
          messageElement.textContent = message.sender + ': ' + message.content;
          messageElement.class = "border-bottom mb-1";
          chat.appendChild(messageElement)
          chat.scrollTop = chat.scrollHeight;
       }

        function sendMessage(){
          var sender = document.getElementById('senderInput').value;
          var content = document.getElementById('messageInput').value;
          var chatMessage = {
              sender:sender,
              content:content
          }
          stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));
          document.getElementById('messageInput').value='';
           if (!senderInput.disabled) {
              senderInput.disabled = true;
              }
        }

    document.getElementById('sendMessage').onclick = sendMessage;
    window.onload = connect;


</script>
</html>
